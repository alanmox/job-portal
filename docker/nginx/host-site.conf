server {
    server_name job-portal.allantech.co.tz;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/job-portal.allantech.co.tz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/job-portal.allantech.co.tz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = job-portal.allantech.co.tz) {
        return 301 https://$host$request_uri;
    }

    server_name job-portal.allantech.co.tz;
    listen 80;
    return 404;
}
